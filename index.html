<!DOCTYPE html>
<html>
<body>

<h1>Grocery List</h1>

<input id="item" placeholder="Item name">

<input id="category" placeholder="Category">

<button onclick="addItem()">Add</button>


<h2>My Items:</h2>

<ul id="list"></ul>


<button onclick="generateList()">Generate Shopping List</button>

<button onclick="deleteChecked()">Delete Checked Items</button>


<script>

function addItem() {

    let name = document.getElementById("item").value;
    let category = document.getElementById("category").value;

    if (name === "") {
        return;
    }

    let items = JSON.parse(localStorage.getItem("items")) || [];


    items.push({
        name: name,
        category: category,
        selected: false
    });


    localStorage.setItem(
        "items",
        JSON.stringify(items)
    );


    document.getElementById("item").value = "";
    document.getElementById("category").value = "";


    displayItems();

}

function deleteChecked() {

    let items = JSON.parse(localStorage.getItem("items")) || [];

    let checkboxes = document.querySelectorAll("#list input[type='checkbox']");


    let remainingItems = [];


    items.forEach((item, index) => {

        if (!checkboxes[index].checked) {
            remainingItems.push(item);
        }

    });


    localStorage.setItem(
        "items",
        JSON.stringify(remainingItems)
    );


    displayItems();

}

function displayItems() {

    let items = JSON.parse(localStorage.getItem("items")) || [];

    let list = document.getElementById("list");

    list.innerHTML = "";


    items.forEach((item, index) => {


        let li = document.createElement("li");


        let checkbox = document.createElement("input");

        checkbox.type = "checkbox";

        checkbox.checked = item.selected;


        checkbox.onchange = function() {

            items[index].selected = checkbox.checked;


            localStorage.setItem(
                "items",
                JSON.stringify(items)
            );

        };


        li.appendChild(checkbox);


        li.appendChild(
            document.createTextNode(
                " " + item.name + " (" + item.category + ")"
            )
        );


        list.appendChild(li);


    });

}



function generateList() {

    let items = JSON.parse(localStorage.getItem("items")) || [];


    let html = `
<!DOCTYPE html>
<html>
<body>

<h1>Shopping List</h1>

<ul>
`;


    items
    .filter(item => item.selected)
    .forEach(item => {


        html += `
<li>
<input type="checkbox">
${item.name} (${item.category})
</li>
`;

    });



    html += `
</ul>

</body>
</html>
`;



    let file = new Blob(
        [html],
        {type: "text/html"}
    );


    let link = document.createElement("a");


    link.href = URL.createObjectURL(file);

    link.download = "shopping_list.html";


    link.click();

}



displayItems();

</script>

</body>
</html>
