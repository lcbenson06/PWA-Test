<!DOCTYPE html>
<html>
<body>

<h1>Grocery List</h1>

<input id="item" placeholder="Item name">

<select id="category">

    <option value="Produce">Produce</option>
    <option value="Dairy">Dairy</option>
    <option value="Meat">Meat</option>
    <option value="Bakery">Bakery</option>
    <option value="Frozen">Frozen</option>
    <option value="Pantry">Pantry</option>
    <option value="Snacks">Snacks</option>
    <option value="Beverages">Beverages</option>
    <option value="Other">Other</option>

</select>

<button onclick="addItem()">Add</button>

<h3>Import Items</h3>

<textarea id="bulkInput" rows="6" cols="40"
placeholder="Paste items here..."></textarea>

<br>

<button onclick="importItems()">Import List</button>

<h2>My Items:</h2>

<ul id="list"></ul>
    
<button onclick="generateList()">Generate Shopping List</button>

<button onclick="deleteChecked()">Delete Checked Items</button>

<div id="deleteConfirm" style="display:none;">

    <p>Are you sure you want to delete the selected items?</p>

    <button onclick="confirmDelete()">Yes</button>

    <button onclick="cancelDelete()">Cancel</button>

</div>
<pre id="debugBox" style="background:#111;color:#0f0;padding:10px;"></pre>
<script>

function addItem() {

    let name = document.getElementById("item").value;
    let category = document.getElementById("category").value;

    if (name === "") {
        return;
    }

    let items = JSON.parse(localStorage.getItem("items")) || [];


    items.push({
        id: Date.now(),
        name: name,
        category: category,
        selected: false
    });


    localStorage.setItem(
        "items",
        JSON.stringify(items)
    );


    document.getElementById("item").value = "";
    document.getElementById("category").selectedIndex = 0;


    displayItems();

}

function importItems() {

    let text = document.getElementById("bulkInput").value;

    if (!text.trim()) return;

    let lines = text.split("\n");

    let newItems = [];

    lines.forEach(line => {

        let parts = line.split(",");

        let name = parts[0]?.trim();
        let category = parts[1]?.trim() || "Other";

        if (name) {
            newItems.push({
                id: Date.now() + Math.random(),
                name: name,
                category: category,
                selected: false
            });
        }

    });

    // 🚨 Replace existing list completely
    localStorage.setItem(
        "items",
        JSON.stringify(newItems)
    );

    document.getElementById("bulkInput").value = "";

    displayItems();
}
    
function deleteChecked() {

    document.getElementById("deleteConfirm").style.display = "block";

}


function cancelDelete() {

    document.getElementById("deleteConfirm").style.display = "none";

}


function confirmDelete() {

    let items = JSON.parse(localStorage.getItem("items")) || [];


    let checkboxes = document.querySelectorAll(
        "#list input[type='checkbox']:checked"
    );


    let deleteIDs = [];


    checkboxes.forEach(box => {

        deleteIDs.push(
            Number(box.dataset.id)
        );

    });


    items = items.filter(item =>
        !deleteIDs.includes(item.id)
    );


    localStorage.setItem(
        "items",
        JSON.stringify(items)
    );


    document.getElementById("deleteConfirm").style.display = "none";


    displayItems();

}
function debugPrint(label = "") {
    const data = JSON.parse(localStorage.getItem("items")) || [];

    console.log("DEBUG:", label, data);

    const box = document.getElementById("debugBox");
    if (box) {
        box.textContent =
            label + "\n" + JSON.stringify(data, null, 2);
    }
}
function displayItems() {

    let items = JSON.parse(localStorage.getItem("items")) || [];

    let list = document.getElementById("list");

    list.innerHTML = "";


    // Group items by category
    let categories = {};


    items.forEach(item => {

        if (!categories[item.category]) {
            categories[item.category] = [];
        }

        categories[item.category].push(item);

    });


    // Sort categories alphabetically
    let sortedCategories = Object.keys(categories).sort();


    let displayIndex = 0;


    sortedCategories.forEach(category => {


        let categoryTitle = document.createElement("h3");

        categoryTitle.textContent = category;

        list.appendChild(categoryTitle);



        // Sort items alphabetically within category
        [...categories[category]]
            .sort((a, b) => a.name.localeCompare(b.name))
            .forEach(item => {


                let li = document.createElement("li");


                let checkbox = document.createElement("input");

                checkbox.type = "checkbox";
                
                checkbox.dataset.id = item.id;

                checkbox.checked = item.selected;


                checkbox.onchange = function() {

                    let currentItems = JSON.parse(localStorage.getItem("items")) || [];
                
                    let updatedItems = currentItems.map(i => {
                        if (i.id === item.id) {
                            return {
                                ...i,
                                selected: checkbox.checked
                            };
                        }
                        return i;
                    });
                
                    localStorage.setItem(
                        "items",
                        JSON.stringify(updatedItems)
                    );
                    debugPrint("After checkbox change");
                };


                li.appendChild(checkbox);


                li.appendChild(
                    document.createTextNode(
                        " " + item.name
                    )
                );


                list.appendChild(li);


            });

    });
    debugPrint("After displayItems()");
}


function generateList() {

    let items = JSON.parse(localStorage.getItem("items")) || [];

    debugPrint("Before generate");
    
    let checkboxes = document.querySelectorAll(
        "#list input[type='checkbox']:checked"
    );
    
    let selectedIDs = [];
    
    checkboxes.forEach(box => {
        selectedIDs.push(Number(box.dataset.id));
    });
    
    let selectedItems = items.filter(item =>
        selectedIDs.includes(item.id)
    );


    // Group items by category
    let categories = {};


    selectedItems.forEach(item => {

        if (!categories[item.category]) {
            categories[item.category] = [];
        }

        categories[item.category].push(item.name);

    });


    // Sort categories alphabetically
    let sortedCategories = Object.keys(categories).sort();


    let html = `
<!DOCTYPE html>
<html>
<body>

<h1>Shopping List</h1>
`;


    sortedCategories.forEach(category => {


        html += `
<h2>${category}</h2>
<ul>
`;


        // Sort items alphabetically inside category
        categories[category]
            .sort()
            .forEach(item => {

                html += `
<li>
<input type="checkbox">
${item}
</li>
`;

            });


        html += `
</ul>
`;

    });


    html += `
</body>
</html>
`;



    let file = new Blob(
        [html],
        {type: "text/html"}
    );


    let link = document.createElement("a");


    link.href = URL.createObjectURL(file);

    link.download = "shopping_list.html";

    link.click();

}
<button id="uncheckAllBtn">Uncheck All</button>

<div id="list"></div>

<script>
document.getElementById("uncheckAllBtn").addEventListener("click", () => {
    let items = JSON.parse(localStorage.getItem("items")) || [];

    items.forEach(item => {
        item.selected = false;
    });

    localStorage.setItem("items", JSON.stringify(items));

    document.getElementById("list").innerHTML = "";
    displayItems();
});
displayItems();
console.log("SCRIPT LOADED");
</script>

</body>
</html>
