<!DOCTYPE html>
<html>
<body>

<h1>Grocery Test</h1>

<input id="item" placeholder="New item">
<button onclick="addItem()">Add</button>

<h2>Items:</h2>
<ul id="list"></ul>

<button onclick="generateList()">Generate Shopping List</button>

<script>

function addItem() {
    let input = document.getElementById("item");

    let items = JSON.parse(localStorage.getItem("items")) || [];

    items.push(input.value);

    localStorage.setItem(
        "items",
        JSON.stringify(items)
    );

    input.value = "";

    displayItems();
}


function displayItems() {

    let items = JSON.parse(localStorage.getItem("items")) || [];

    let list = document.getElementById("list");

    list.innerHTML = "";

    items.forEach(item => {

        let li = document.createElement("li");

        li.textContent = item;

        list.appendChild(li);

    });
}


function generateList() {

    let items = JSON.parse(localStorage.getItem("items")) || [];

    let html = `
<!DOCTYPE html>
<html>
<body>

<h1>Shopping List</h1>

<ul>
`;

    items.forEach(item => {

        html += `
<li>
<input type="checkbox">
${item}
</li>
`;

    });


    html += `
</ul>

</body>
</html>
`;


    let file = new Blob(
        [html],
        {type: "text/html"}
    );


    let link = document.createElement("a");

    link.href = URL.createObjectURL(file);

    link.download = "shopping_list.html";

    link.click();

}


displayItems();

</script>

</body>
</html>
